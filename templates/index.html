<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Oil Adulteration Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #f8fafc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-align: center;
            background: -webkit-linear-gradient(#60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-bottom: 3rem;
        }
        .container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.3);
        }
        .card h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .card p {
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <h1>Smart Oil Detection System</h1>
    <p class="subtitle">IoT & Machine Learning powered Adulteration Analysis</p>
    
    <div class="container">
        <a href="/training" class="card">
            <h2>🧠 Training</h2>
            <p>Calibrate sensors, build dataset, and train the ML models.</p>
        </a>
        <a href="/testing" class="card">
            <h2>🧪 Testing</h2>
            <p>Predict adulteration level using the trained Hybrid model.</p>
        </a>
    </div>
</body>
</html>
